name: build-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string
      publish_pypi:
        description: "Also publish wheels to PyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  meta:
    name: derive-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish_pypi: ${{ steps.meta.outputs.publish_pypi }}

    steps:
      - name: Derive version metadata
        id: meta
        env:
          VERSION_INPUT: ${{ github.event.inputs.version || '' }}
          PUBLISH_PYPI_INPUT: ${{ github.event.inputs.publish_pypi || 'false' }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
            publish_pypi="true"
          else
            version="${VERSION_INPUT}"
            if [[ -z "${version}" ]]; then
              echo "workflow_dispatch requires a version input" >&2
              exit 1
            fi
            release_tag="v${version}"
            publish_pypi="${PUBLISH_PYPI_INPUT}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "publish_pypi=${publish_pypi}" >> "${GITHUB_OUTPUT}"

  build:
    name: build-${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
          - runner: ubuntu-latest
            target: linux-aarch64
          - runner: ubuntu-latest
            target: windows-x64
          - runner: macos-latest
            target: darwin-x64
          - runner: macos-latest
            target: darwin-aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build setuptools wheel twine

      - name: Install Zig
        env:
          ZIG_VERSION: "0.15.2"
        run: ./wirehair-all-os/install-zig.sh "${RUNNER_TEMP}/zig"

      - name: Build SDK target
        run: ./wirehair-all-os/build-all.sh ${{ matrix.target }}

      - name: Run ctypes smoke test when runnable
        working-directory: wirehair-all-os/out/build/${{ matrix.target }}
        run: ctest --output-on-failure

      - name: Build Python wheel
        run: |
          python wirehair-all-os/build-python-wheel.py \
            --target ${{ matrix.target }} \
            --version ${{ needs.meta.outputs.version }} \
            --no-isolation

      - name: Package C++ SDK
        run: |
          python wirehair-all-os/package-sdk.py \
            --target ${{ matrix.target }} \
            --version ${{ needs.meta.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: |
            wirehair-all-os/out/sdk/*.zip
            wirehair-all-os/out/wheelhouse/*.whl

  publish-release:
    name: publish-release
    if: needs.meta.outputs.release_tag != ''
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t assets < <(find artifacts -type f \( -name '*.zip' -o -name '*.whl' \) | sort)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets were produced" >&2
            find artifacts -maxdepth 5 -type f | sort || true
            exit 1
          fi

          release_tag="${{ needs.meta.outputs.release_tag }}"

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" "${assets[@]}" --clobber
          else
            gh release create "${release_tag}" "${assets[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${release_tag}" \
              --generate-notes
          fi

  publish-pypi:
    name: publish-pypi
    if: needs.meta.outputs.publish_pypi == 'true'
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Twine
        run: python -m pip install --upgrade pip twine

      - name: Skip PyPI publish when token is missing
        if: env.TWINE_PASSWORD == ''
        run: echo "PYPI_API_TOKEN is not configured; skipping PyPI publish."

      - name: Publish wheels to PyPI
        if: env.TWINE_PASSWORD != ''
        shell: bash
        run: |
          mapfile -t wheels < <(find artifacts -type f -name '*.whl' | sort)
          if [[ ${#wheels[@]} -eq 0 ]]; then
            echo "No wheel files were produced" >&2
            find artifacts -maxdepth 5 -type f | sort || true
            exit 1
          fi
          python -m twine upload --skip-existing "${wheels[@]}"
